<!DOCTYPE html>
<html>
  <head>
      <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
      <style>
        .modal {
          display: none;
          position: fixed;
          z-index: 1;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0,0,0,0.8);
        }
        .modal.show {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .modal-content {
          background-color: #1a1a1a;
          padding: 2rem;
          border-radius: 0.5rem;
          border: 2px solid #4b5563;
          max-width: 500px;
          width: 90%;
        }
      </style>
  </head>
  <body>
    <section class="bg-black ">
        <div class="container px-5 py-12 mx-auto lg:px-20">
            <div class="flex flex-col flex-wrap pb-6 mb-12 text-white ">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="mb-12 text-3xl font-medium text-white">
                            Recipes - Better than all the REST
                        </h1>
                        <p class="text-base leading-relaxed">
                            Latest recipes...</p>
                    </div>
                    <button 
                        onclick="openCreateModal()"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-300">
                        + 添加菜品
                    </button>
                </div>
            </div>
            {% for recipe in recipes %}
                <div
                    class="flex flex-wrap items-end justify-start w-full transition duration-500 ease-in-out transform bg-black border-2 border-gray-600 rounded-lg hover:border-white ">
                    <div class="w-full xl:w-1/4 md:w-1/4">
                        <div class="relative flex flex-col h-full p-8 ">
                            <h2 class="mb-4 font-semibold tracking-widest text-white uppercase title-font">
                                {{recipe.label}}
                            </h2>
                            <p class="flex items-center mb-2 text-lg font-normal tracking-wide text-white">
                                <span
                                    class="inline-flex items-center justify-center flex-shrink-0 w-5 h-5 mr-2 text-white rounded-full bg-blue-1300">
                                    <svg fill="none" stroke="currentColor" stroke-linecap="round"
                                        stroke-linejoin="round" stroke-width="2.5" class="w-4 h-4" viewBox="0 0 24 24">
                                        <path d="M20 6L9 17l-5-5"></path>
                                    </svg>
                                </span>{{recipe.source}}
                            </p>
                        </div>
                    </div>
                    <div class="w-full xl:w-1/4 md:w-1/4 lg:ml-auto">
                        <div class="relative flex flex-col h-full p-8">
                            <h1 class="flex items-end mx-auto text-3xl font-black leading-none text-white ">
                                <span>View Recipe </span>
                            </h1>
                            <button
                                    class="w-full px-4 py-2 mx-auto mt-3 text-white transition duration-500 ease-in-out transform border border-gray-900 rounded-lg text-md hover:bg-gray-900 focus:shadow-outline focus:outline-none focus:ring-2 ring-offset-current ring-offset-2 focus:border-gray-700 focus:bg-gray-800 "><a href="{{recipe.url}}">Visit Site</a>
                            </button>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </section>

    <!-- 创建菜品的模态框 -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold text-white mb-6">添加新菜品</h2>
            
            <form id="createRecipeForm" onsubmit="submitRecipe(event)">
                <div class="mb-4">
                    <label class="block text-white text-sm font-bold mb-2" for="label">
                        菜品名称 *
                    </label>
                    <input 
                        class="w-full px-3 py-2 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        id="label" 
                        name="label" 
                        type="text" 
                        placeholder="例如：宫保鸡丁"
                        required>
                </div>

                <div class="mb-4">
                    <label class="block text-white text-sm font-bold mb-2" for="source">
                        菜品来源 *
                    </label>
                    <input 
                        class="w-full px-3 py-2 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        id="source" 
                        name="source" 
                        type="text" 
                        placeholder="例如：家常菜"
                        required>
                </div>

                <div class="mb-4">
                    <label class="block text-white text-sm font-bold mb-2" for="url">
                        菜品链接 *
                    </label>
                    <input 
                        class="w-full px-3 py-2 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        id="url" 
                        name="url" 
                        type="url" 
                        placeholder="https://example.com/recipe"
                        required>
                </div>

                <div class="mb-6">
                    <label class="block text-white text-sm font-bold mb-2" for="submitter_id">
                        提交者ID *
                    </label>
                    <input 
                        class="w-full px-3 py-2 text-black rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                        id="submitter_id" 
                        name="submitter_id" 
                        type="number" 
                        placeholder="1"
                        required>
                </div>

                <div id="errorMessage" class="mb-4 p-3 rounded-lg bg-red-500 text-white hidden"></div>
                <div id="successMessage" class="mb-4 p-3 rounded-lg bg-green-500 text-white hidden"></div>

                <div class="flex gap-3">
                    <button 
                        type="button"
                        onclick="closeCreateModal()"
                        class="flex-1 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition duration-300">
                        取消
                    </button>
                    <button 
                        type="submit"
                        class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-300">
                        创建菜品
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openCreateModal() {
            document.getElementById('createModal').classList.add('show');
            document.getElementById('createRecipeForm').reset();
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('createModal');
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }

        async function submitRecipe(event) {
            event.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // 清除之前的消息
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            const formData = {
                label: document.getElementById('label').value,
                source: document.getElementById('source').value,
                url: document.getElementById('url').value,
                submitter_id: parseInt(document.getElementById('submitter_id').value)
            };

            try {
                const response = await fetch('/api/v1/recipes/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || '创建失败');
                }

                const result = await response.json();
                
                // 显示成功消息
                successDiv.textContent = `✓ 菜品 "${result.label}" 创建成功！`;
                successDiv.classList.remove('hidden');
                
                // 2秒后关闭模态框并刷新页面
                setTimeout(() => {
                    closeCreateModal();
                    location.reload();
                }, 2000);

            } catch (error) {
                errorDiv.textContent = `✗ 错误: ${error.message}`;
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
  </body>
</html>
